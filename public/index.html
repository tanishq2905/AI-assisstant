<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e10;
      --surface: #18181c;
      --surface2: #222228;
      --border: rgba(255,255,255,0.07);
      --border2: rgba(255,255,255,0.12);
      --text: #f0f0f2;
      --text-muted: #7a7a8a;
      --text-dim: #4a4a5a;
      --accent: #7c6aff;
      --accent-soft: rgba(124,106,255,0.12);
      --accent-glow: rgba(124,106,255,0.25);
      --user-bg: #1e1b3a;
      --user-border: rgba(124,106,255,0.3);
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .header-text { flex: 1; }
    .header-title { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
    .header-sub { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
    .online-dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; }

    #clear-btn {
      font-family: var(--font);
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    #clear-btn:hover { color: var(--text); border-color: var(--border2); background: var(--surface2); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scrollbar-width: thin;
      scrollbar-color: var(--surface2) transparent;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }

    .msg { display: flex; gap: 12px; align-items: flex-start; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .assistant .msg-avatar { background: var(--accent-soft); border: 1px solid var(--accent-glow); color: var(--accent); }
    .user .msg-avatar { background: var(--surface2); border: 1px solid var(--border2); color: var(--text-muted); }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.7;
      border-radius: 4px 12px 12px 12px;
    }
    .assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px 12px 12px 12px;
      color: var(--text);
    }
    .user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: 12px 4px 12px 12px;
      color: #c4bcff;
    }

    .bubble code {
      font-family: var(--mono);
      font-size: 12px;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.8s infinite;
    }
    @keyframes blink { 0%,50%{opacity:1} 51%,100%{opacity:0} }

    .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
    .typing-dots span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text-dim);
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent-glow); }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      resize: none;
      line-height: 1.6;
      max-height: 120px;
      min-height: 22px;
    }
    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    #send-btn:hover { opacity: 0.88; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    #send-btn svg { width: 15px; height: 15px; stroke: #fff; fill: none; stroke-width: 2.2; }

    .hint { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 10px; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .empty-icon { font-size: 36px; opacity: 0.4; }
    .empty-title { font-size: 16px; font-weight: 500; color: var(--text); }
    .empty-sub { font-size: 13px; color: var(--text-muted); text-align: center; max-width: 280px; line-height: 1.6; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
    .suggestion {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      background: none;
      font-family: var(--font);
    }
    .suggestion:hover { border-color: var(--accent-glow); color: var(--accent); background: var(--accent-soft); }
  </style>
</head>
<body>

<div id="header">
  <div class="logo">✦</div>
  <div class="header-text">
    <div class="header-title">AI Assistant</div>
    <div class="header-sub"><span class="online-dot"></span> Online · Claude Sonnet</div>
  </div>
  <button id="clear-btn">Clear chat</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <div class="empty-icon">✦</div>
    <div class="empty-title">How can I help you today?</div>
    <div class="empty-sub">Ask me anything — I'm powered by Claude and ready to assist.</div>
    <div class="suggestions">
      <button class="suggestion" onclick="fillInput(this)">Explain a concept</button>
      <button class="suggestion" onclick="fillInput(this)">Write some code</button>
      <button class="suggestion" onclick="fillInput(this)">Summarize text</button>
      <button class="suggestion" onclick="fillInput(this)">Brainstorm ideas</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="user-input" placeholder="Message AI Assistant..." rows="1"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
  <div class="hint">Press Enter to send · Shift+Enter for new line</div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const emptyState = document.getElementById('empty-state');
  let history = [];

  function fillInput(btn) {
    inputEl.value = btn.textContent;
    inputEl.focus();
  }

  function addMessage(role, text = '') {
    if (emptyState) emptyState.remove();
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = role === 'assistant' ? 'AI' : 'You';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (text) bubble.textContent = text;
    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sendBtn.disabled) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', content: text });

    const bubble = addMessage('assistant');
    bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';

    let fullReply = '';
    let started = false;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          try {
            const evt = JSON.parse(line.slice(6));
            if (evt.type === 'text') {
              if (!started) { bubble.innerHTML = ''; started = true; }
              fullReply += evt.text;
              bubble.textContent = fullReply;
              const cursor = document.createElement('span');
              cursor.className = 'cursor';
              bubble.appendChild(cursor);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            } else if (evt.type === 'done') {
              bubble.textContent = fullReply;
              history.push({ role: 'assistant', content: fullReply });
            } else if (evt.type === 'error') {
              bubble.textContent = 'Error: ' + evt.message;
            }
          } catch {}
        }
      }
    } catch (e) {
      bubble.textContent = 'Connection error. Is the server running?';
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', sendMessage);
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  document.getElementById('clear-btn').addEventListener('click', () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(Object.assign(document.createElement('div'), {
      className: 'empty-state',
      id: 'empty-state',
      innerHTML: `<div class="empty-icon">✦</div><div class="empty-title">How can I help you today?</div><div class="empty-sub">Ask me anything — I'm powered by Claude and ready to assist.</div>`
    }));
  });
</script>
</body>
</html>
